<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon-err.png">
<title>Page Not Found</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .banner {
    background: var(--color-background-warning);
    color: var(--color-text-warning);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 0.5px solid var(--color-border-warning);
  }

  body {
    background: #000000;
    color: #e8e6e1;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 40px 24px;
    text-align: center;
    max-width: 400px;
  }

  .code {
    font-family: 'Raleway', sans-serif;
    font-size: 96px;
    font-weight: 300;
    color: #1e1e24;
    letter-spacing: -0.04em;
    line-height: 1;
    user-select: none;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: #2e2e35;
  }

  .message {
    font-size: 18px;
    font-weight: 300;
    color: #e8e6e1;
    letter-spacing: -0.01em;
  }

  .sub {
    font-size: 14px;
    color: #555;
    line-height: 1.7;
  }

  .home-link {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #444;
    text-decoration: none;
    padding: 10px 20px;
    border: 1px solid #222;
    border-radius: 2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .home-link:hover {
    color: #e8e6e1;
    border-color: #444;
  }

  footer {
    position: fixed;
    bottom: 24px;
    font-size: 12px;
    color: #2a2a30;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="container">
  <img width="50%" src="SoftwareTerminated.png">
  <span>
  <h1>Error 404</h1>
  <p><strong>Page Not Found</strong></p>
  </span>
</div>

<footer>lumanesence.co.uk</footer>

</body>
</html>
